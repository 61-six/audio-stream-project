syntax = "proto3";

package audio;

option go_package = "./api";

// ============ 请求消息 ============

message AudioMetadata {
    string filename = 1;
    int32 sample_rate = 2;
    int32 channels = 3;
    string codec = 4;
    string session_id = 5;
    int64 total_size = 6;
    string client_id = 7;
}

// 音频数据块
message AudioChunk {
    bytes data = 1;               // 音频数据
    bool is_last = 2;             // 是否最后一块
    int32 sequence = 3;           // 可选：序列号，用于顺序校验
}

// 上传请求（支持多种消息类型）
message UploadRequest {
    oneof message {
        AudioMetadata metadata = 1;
        AudioChunk chunk = 2;
    }
}

// ============ 响应消息 ============

// 处理状态（实时反馈）
message ProcessingStatus {
    string session_id = 1;        // 会话ID
    int64 received_bytes = 2;     // 已接收字节数
    int32 chunk_count = 3;        // 已接收块数
    string status = 4;            // 状态: "uploading", "processing", "completed", "failed"
    string error = 5;             // 错误信息（如果有）
    double progress = 6;          // 进度百分比 (0-100)
    int64 processed_bytes = 7;    // 已处理字节数（转码后）
}

// 处理完成摘要（最终结果）
message ProcessingSummary {
    string session_id = 1;        // 会话ID
    int64 received_bytes = 2;     // 接收总字节数
    int32 chunk_count = 3;        // 接收总块数
    string output_format = 4;     // 输出格式
    int32 sample_rate = 5;        // 输出采样率
    int32 channels = 6;           // 输出声道数
    int32 frame_size = 7;         // 帧大小（字节）
    int32 frame_count = 8;        // 总帧数
    int64 duration_ms = 9;        // 时长（毫秒）
    double avg_energy = 10;       // 平均能量
    double max_energy = 11;       // 最大能量
    double min_energy = 12;       // 最小能量
    string output_file = 13;      // 输出文件路径
    string status = 14;           // 最终状态: "success", "failed"
    string error = 15;            // 错误信息（如果有）
}

// 状态响应（支持多种消息类型）
message StatusResponse {
    oneof message {
        ProcessingStatus status = 1;
        ProcessingSummary summary = 2;
    }
}

// ============ 服务定义 ============

service AudioService {
    // 上传音频流（双向流）
    rpc Upload(stream UploadRequest) returns (stream StatusResponse);

    // 可选：健康检查
    rpc HealthCheck(HealthRequest) returns (HealthResponse);
}

// ============ 健康检查 ============

message HealthRequest {
    string service = 1;
}

message HealthResponse {
    string status = 1;            // "ok", "degraded", "down"
    string version = 2;
    int64 uptime_seconds = 3;
}