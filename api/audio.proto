syntax = "proto3";

package audio;

option go_package = "./api";

message AudioMetadata {
    string filename = 1;
    int32 sample_rate = 2;
    int32 channels = 3;
    string codec = 4;
}

message AudioChunk {
    bytes data = 1;
    bool is_last = 2;
}

message UploadRequest {
    oneof message {
        AudioMetadata metadata = 1;
        AudioChunk chunk = 2;
    }
}

message ProcessingStatus {
    string session_id = 1;
    int64 received_bytes = 2;
    int32 chunk_count = 3;
    string status = 4;
    string error = 5;
}

message ProcessingSummary {
    string session_id = 1;
    int64 received_bytes = 2;
    int32 chunk_count = 3;
    string output_format = 4;
    int32 frame_size = 5;
    int32 frame_count = 6;
    int64 duration_ms = 7;
    double avg_energy = 8;
    string output_file = 9;
}

message StatusResponse {
    oneof message {
        ProcessingStatus status = 1;
        ProcessingSummary summary = 2;
    }
}

service AudioService {
    rpc Upload(stream UploadRequest) returns (stream StatusResponse);
}
