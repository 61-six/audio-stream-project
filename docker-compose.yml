services:
  server:
    build: .
    ports:
      - "50051:50051"
    volumes:
      - ./output:/app/output
      - ./testdata:/app/testdata
    command: ["./server"]
    networks:
      - audio-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3

  client:
    profiles: ["client"]
    build: .
    volumes:
      - ./testdata:/app/testdata
      - ./output:/app/output
    networks:
      - audio-network
    entrypoint: ["./client"]
    command: ["--file", "/app/testdata/sample.wav", "--address", "server:50051"]
    depends_on:
      server:
        condition: service_healthy

networks:
  audio-network:
    driver: bridge